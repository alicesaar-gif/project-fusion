version: '3.8'

services:
  db:
    image: fusion_db:latest
    build: ./database
    networks:
      - fusion_network
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  api:
    image: fusion_api:latest
    build: ./api
    networks:
      - fusion_network
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: on-failure

  nginx:
    image: fusion_nginx:latest
    build: ./nginx
    networks:
      - fusion_network
    ports:
      - "80:80"
    depends_on:
      - api
    deploy:
      mode: replicated
      replicas: 1

networks:
  fusion_network:
    driver: overlay
    attachable: true

volumes:
  db_data: