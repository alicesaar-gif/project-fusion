events {
    worker_connections 1024;
}

http {
    upstream api_servers {
        # O NGINX vai procurar o serviço "api" e distribuir a carga
        server api:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
